<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fakebook – ClassTools Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tahoma:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Tahoma, Arial, sans-serif;
    font-size: 13px;
    background: #e9ebee;
    color: #1c1e21;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  #topbar {
    background: #3b5998;
    padding: 0 10px;
    display: flex;
    align-items: center;
    height: 44px;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #topbar .logo {
    color: white;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -1px;
    font-style: italic;
  }
  #topbar .logo span { color: #c8d8f0; }
  #topbar .tagline {
    color: #c8d8f0;
    font-size: 11px;
    flex: 1;
  }
  #topbar button {
    background: #4e69a2;
    border: 1px solid #3b5998;
    color: white;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-family: Tahoma, Arial, sans-serif;
  }
  #topbar button:hover { background: #5a7ab5; }

  /* ── COVER ── */
  #cover-area {
    background: #3b5998;
    height: 200px;
    position: relative;
    overflow: hidden;
  }
  #cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  #cover-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #3b5998 0%, #5a7fc7 50%, #3b5998 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.15);
    font-size: 48px;
  }
  #cover-edit-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: Tahoma, Arial, sans-serif;
  }
  #cover-edit-btn:hover { background: rgba(0,0,0,0.8); }
  #cover-file { display: none; }

  /* ── PROFILE HEADER ── */
  #profile-header {
    background: white;
    border-bottom: 1px solid #dddfe2;
    padding-bottom: 0;
  }
  #profile-identity {
    max-width: 940px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    padding: 0 16px;
    position: relative;
    top: -32px;
    margin-bottom: -16px;
  }
  #avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }
  #avatar-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid white;
    background: #c8c8c8;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  #avatar-file { display: none; }
  #avatar-edit-hint {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #avatar-wrap:hover #avatar-edit-hint { opacity: 1; }
  #profile-name-wrap {
    padding-bottom: 10px;
    flex: 1;
  }
  #profile-name {
    font-size: 26px;
    font-weight: 700;
    color: #1c1e21;
    cursor: pointer;
    display: inline-block;
    min-width: 160px;
    outline: none;
    padding: 2px 4px;
    border-radius: 3px;
    border: 2px solid transparent;
  }
  #profile-name:hover { border-color: #3b5998; background: #f0f2f5; }
  #profile-name:focus { border-color: #3b5998; background: white; }

  /* ── MAIN CONTENT ── */
  #main {
    max-width: 940px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 16px;
    padding: 16px;
  }

  /* ── LEFT COLUMN ── */
  .card {
    background: white;
    border-radius: 6px;
    border: 1px solid #dddfe2;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    padding: 10px 12px 6px;
    color: #1c1e21;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title span.edit-link {
    font-size: 12px;
    color: #3b5998;
    cursor: pointer;
    font-weight: 400;
  }
  .card-title span.edit-link:hover { text-decoration: underline; }

  /* Intro card */
  #intro-list {
    list-style: none;
    padding: 0 12px 10px;
  }
  #intro-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    color: #555;
    font-size: 13px;
  }
  #intro-list li .icon { font-size: 16px; }
  #intro-list li .field {
    flex: 1;
    color: #1c1e21;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    border: 1px solid transparent;
    outline: none;
    font-family: Tahoma, Arial, sans-serif;
    font-size: 13px;
  }
  #intro-list li .field:hover { border-color: #3b5998; background: #f0f2f5; }
  #intro-list li .field:focus { border-color: #3b5998; background: white; }
  #add-intro-btn {
    display: block;
    margin: 4px 12px 10px;
    background: #e4e6eb;
    border: none;
    border-radius: 4px;
    padding: 6px;
    width: calc(100% - 24px);
    cursor: pointer;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    color: #1c1e21;
    font-weight: 700;
    text-align: center;
  }
  #add-intro-btn:hover { background: #d8dadf; }

  /* Friends card */
  #friends-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 8px 12px 12px;
  }
  .friend-tile {
    text-align: center;
    cursor: pointer;
    position: relative;
  }
  .friend-tile img {
    width: 80px;
    height: 80px;
    border-radius: 6px;
    object-fit: cover;
    background: #c8c8c8;
    border: 1px solid #dddfe2;
  }
  .friend-tile .friend-name {
    font-size: 11px;
    color: #1c1e21;
    margin-top: 3px;
    word-break: break-word;
    padding: 0 2px;
    outline: none;
    display: block;
    border-radius: 2px;
    border: 1px solid transparent;
  }
  .friend-tile .friend-name:hover { border-color: #3b5998; background: #f0f2f5; }
  .friend-tile .friend-name:focus { border-color: #3b5998; background: white; }
  .friend-tile .remove-friend {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .friend-tile:hover .remove-friend { display: flex; }
  #add-friend-btn {
    display: block;
    margin: 0 12px 12px;
    background: #e4e6eb;
    border: none;
    border-radius: 4px;
    padding: 6px;
    width: calc(100% - 24px);
    cursor: pointer;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    color: #1c1e21;
    font-weight: 700;
    text-align: center;
  }
  #add-friend-btn:hover { background: #d8dadf; }
  #friend-file { display: none; }

  /* ── RIGHT COLUMN ── */
  /* Post composer */
  #composer {
    background: white;
    border-radius: 6px;
    border: 1px solid #dddfe2;
    padding: 12px;
    margin-bottom: 12px;
  }
  #composer h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #1c1e21;
  }
  .composer-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .composer-row label {
    font-weight: 700;
    color: #555;
    line-height: 28px;
    white-space: nowrap;
  }
  .composer-row input[type="text"], .composer-row input[type="date"] {
    border: 1px solid #dddfe2;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    color: #1c1e21;
    background: #f5f6fa;
    height: 28px;
  }
  #post-author { flex: 1; }
  #post-date { width: 140px; }
  #post-content {
    width: 100%;
    border: 1px solid #dddfe2;
    border-radius: 4px;
    padding: 8px;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    color: #1c1e21;
    background: #f5f6fa;
    resize: vertical;
    min-height: 70px;
    margin-bottom: 8px;
  }
  #post-content:focus, .composer-row input:focus {
    outline: none;
    border-color: #3b5998;
    background: white;
  }
  .composer-tips {
    font-size: 11px;
    color: #888;
    margin-bottom: 8px;
  }
  #post-btn {
    background: #3b5998;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 8px 20px;
    font-size: 14px;
    font-family: Tahoma, Arial, sans-serif;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  #post-btn:hover { background: #4a6ab5; }
  #post-image-btn {
    background: #e4e6eb;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    cursor: pointer;
    color: #1c1e21;
    margin-bottom: 8px;
  }
  #post-image-btn:hover { background: #d8dadf; }
  #post-image-file { display: none; }

  /* Feed */
  #feed { }
  .post-card {
    background: white;
    border-radius: 6px;
    border: 1px solid #dddfe2;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 12px 8px;
  }
  .post-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #c8c8c8;
    object-fit: cover;
    flex-shrink: 0;
  }
  .post-meta { flex: 1; }
  .post-author-name {
    font-weight: 700;
    color: #1c1e21;
    font-size: 13px;
  }
  .post-date {
    font-size: 11px;
    color: #888;
  }
  .post-body {
    padding: 0 12px 10px;
    font-size: 13px;
    color: #1c1e21;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .post-body img {
    max-width: 100%;
    border-radius: 4px;
    margin-top: 8px;
    display: block;
  }
  .post-footer {
    border-top: 1px solid #dddfe2;
    display: flex;
    padding: 4px 12px;
    gap: 4px;
  }
  .post-action {
    background: none;
    border: none;
    color: #606770;
    font-size: 12px;
    font-family: Tahoma, Arial, sans-serif;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 700;
    flex: 1;
    text-align: center;
  }
  .post-action:hover { background: #e4e6eb; color: #1c1e21; }
  .post-action.delete { color: #e44; }
  .post-action.delete:hover { background: #fee; }

  .like-count {
    font-size: 11px;
    color: #888;
    padding: 4px 12px;
    border-top: 1px solid #f0f2f5;
  }

  /* Comments */
  .comments-section {
    border-top: 1px solid #dddfe2;
    padding: 8px 12px;
    display: none;
    background: #f8f9fa;
  }
  .comments-section.visible { display: block; }
  .comment {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .comment-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #c8c8c8;
    flex-shrink: 0;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
  }
  .comment-bubble {
    background: white;
    border-radius: 12px;
    padding: 5px 10px;
    font-size: 12px;
    border: 1px solid #dddfe2;
    max-width: calc(100% - 40px);
  }
  .comment-bubble strong { display: block; font-size: 11px; color: #3b5998; }
  .comment-form {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 6px;
  }
  .comment-form .comment-author-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .comment-form .comment-author-row label {
    font-size: 11px;
    font-weight: 700;
    color: #555;
    white-space: nowrap;
  }
  .comment-form .comment-text-row {
    display: flex;
    gap: 6px;
  }
  .comment-form input {
    flex: 1;
    border: 1px solid #dddfe2;
    border-radius: 14px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: Tahoma, Arial, sans-serif;
    outline: none;
    background: white;
  }
  .comment-form input.comment-author-input {
    border-radius: 8px;
    flex: 0 0 160px;
  }
  .comment-form input:focus { border-color: #3b5998; }
  .comment-form button {
    background: #3b5998;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: Tahoma, Arial, sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: white;
    border-radius: 8px;
    padding: 20px;
    min-width: 320px;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1c1e21;
    border-bottom: 1px solid #dddfe2;
    padding-bottom: 8px;
  }
  .modal input[type="text"] {
    width: 100%;
    border: 1px solid #dddfe2;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    margin-bottom: 10px;
    outline: none;
  }
  .modal input:focus { border-color: #3b5998; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .modal-btns button {
    border: none;
    border-radius: 4px;
    padding: 6px 16px;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    cursor: pointer;
    font-weight: 700;
  }
  .btn-primary { background: #3b5998; color: white; }
  .btn-primary:hover { background: #4a6ab5; }
  .btn-cancel { background: #e4e6eb; color: #1c1e21; }
  .btn-cancel:hover { background: #d8dadf; }

  /* ── SCREENSHOT OVERLAY ── */
  #screenshot-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 500;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #screenshot-overlay.visible { display: flex; }
  #screenshot-overlay .ss-box {
    background: white;
    border-radius: 10px;
    padding: 20px;
    max-width: 90vw;
    max-height: 85vh;
    overflow: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.4);
    text-align: center;
  }
  #screenshot-overlay .ss-box h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1c1e21;
  }
  #screenshot-overlay .ss-box img {
    max-width: 100%;
    border: 1px solid #dddfe2;
    border-radius: 4px;
    display: block;
    margin-bottom: 12px;
  }
  #screenshot-overlay .ss-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  #screenshot-overlay .ss-btns button {
    border: none;
    border-radius: 4px;
    padding: 8px 18px;
    font-size: 13px;
    font-family: Tahoma, Arial, sans-serif;
    cursor: pointer;
    font-weight: 700;
  }

  /* ── PRINT ── */
  @media print {
    #topbar, #composer, .post-action, .post-footer, #add-friend-btn, #add-intro-btn, #cover-edit-btn { display: none !important; }
    body { background: white; }
    #main { grid-template-columns: 260px 1fr; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    #main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">Fa<span>k</span>ebook</div>
  <div class="tagline">Create a fake profile for a historical / fictional character</div>
  <button onclick="printPage()">🖨 Print</button>
  <button onclick="saveData()">💾 Save</button>
  <button onclick="loadData()">📂 Load</button>
  <button onclick="takeScreenshot()" id="screenshot-btn" style="background:#e8f0e0;color:#2a5c1a;border-color:#2a5c1a;font-weight:700;">📸 Screenshot</button>
</div>

<!-- COVER PHOTO -->
<div id="cover-area">
  <div id="cover-placeholder">📷</div>
  <img id="cover-img" alt="Cover photo">
  <button id="cover-edit-btn" onclick="document.getElementById('cover-file').click()">📷 Edit Cover Photo</button>
  <input type="file" id="cover-file" accept="image/*" onchange="setCoverPhoto(this)">
</div>

<!-- PROFILE HEADER -->
<div id="profile-header">
  <div id="profile-identity">
    <div id="avatar-wrap">
      <img id="avatar-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='38' r='22' fill='%23aaa'/%3E%3Cellipse cx='50' cy='85' rx='30' ry='20' fill='%23aaa'/%3E%3C/svg%3E" alt="Profile" onclick="document.getElementById('avatar-file').click()" title="Click to change photo">
      <div id="avatar-edit-hint">Change photo</div>
      <input type="file" id="avatar-file" accept="image/*" onchange="setAvatar(this)">
    </div>
    <div id="profile-name-wrap">
      <div id="profile-name" contenteditable="true" spellcheck="false" title="Click to edit name">Name Here</div>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div id="main">

  <!-- LEFT COLUMN -->
  <div id="left-col">
    <!-- Intro Card -->
    <div class="card">
      <div class="card-title">
        Intro
        <span class="edit-link" onclick="addIntroField()">+ Add field</span>
      </div>
      <ul id="intro-list">
        <li>
          <span class="icon">🎂</span>
          <span class="field" contenteditable="true" spellcheck="false" data-placeholder="Born: click to add...">Born: </span>
        </li>
        <li>
          <span class="icon">👨‍👩‍👧</span>
          <span class="field" contenteditable="true" spellcheck="false" data-placeholder="Family: click to add...">Family: </span>
        </li>
      </ul>
    </div>

    <!-- Friends Card -->
    <div class="card">
      <div class="card-title" id="friends-title-bar">
        <span id="friends-title" contenteditable="true" spellcheck="false" style="outline:none;cursor:pointer;padding:2px 4px;border-radius:3px;border:1px solid transparent;" title="Click to rename" onfocus="this.style.borderColor='#3b5998'" onblur="this.style.borderColor='transparent'">Friends</span>
        <span class="edit-link" onclick="addFriend()">+ Add</span>
      </div>
      <div id="friends-grid"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div id="right-col">
    <!-- Composer -->
    <div id="composer">
      <h3>Add a post!</h3>
      <p class="composer-tips">TIP: You can add hyperlinks. Separate multiple paragraphs with a blank line.</p>
      <div class="composer-row">
        <label>Name</label>
        <input type="text" id="post-author" placeholder="Author">
        <label style="margin-left:8px;">Date</label>
        <input type="date" id="post-date">
      </div>
      <textarea id="post-content" placeholder="What's on your mind?"></textarea>
      <button id="post-image-btn" onclick="document.getElementById('post-image-file').click()">📎 Attach Image</button>
      <input type="file" id="post-image-file" accept="image/*" onchange="stagePostImage(this)">
      <div id="staged-image-preview" style="margin-bottom:8px;display:none;">
        <img id="staged-img-thumb" style="max-height:80px;border-radius:4px;border:1px solid #dddfe2;">
        <button onclick="clearStagedImage()" style="background:none;border:none;color:#e44;cursor:pointer;font-size:12px;margin-left:6px;">✕ Remove</button>
      </div>
      <button id="post-btn" onclick="submitPost()">Post</button>
    </div>

    <!-- Feed -->
    <div id="feed"></div>
  </div>
</div>

<!-- ADD FRIEND MODAL -->
<div class="modal-backdrop" id="friend-modal">
  <div class="modal">
    <h3>Add a Friend</h3>
    <label style="font-size:12px;color:#555;display:block;margin-bottom:4px;">Friend's name</label>
    <input type="text" id="new-friend-name" placeholder="e.g. Julius Caesar">
    <label style="font-size:12px;color:#555;display:block;margin-bottom:4px;">Photo (optional – click to upload)</label>
    <div id="friend-avatar-preview" onclick="document.getElementById('friend-file').click()" style="width:60px;height:60px;border-radius:6px;background:#c8c8c8;border:2px dashed #dddfe2;cursor:pointer;overflow:hidden;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:22px;">📷</div>
    <input type="file" id="friend-file" accept="image/*" onchange="previewFriendAvatar(this)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('friend-modal')">Cancel</button>
      <button class="btn-primary" onclick="confirmAddFriend()">Add Friend</button>
    </div>
  </div>
</div>

<!-- SCREENSHOT OVERLAY -->
<div id="screenshot-overlay">
  <div class="ss-box">
    <h3>📸 Screenshot Ready</h3>
    <img id="screenshot-result" alt="Screenshot">
    <div class="ss-btns">
      <button style="background:#3b5998;color:white;" onclick="downloadScreenshot()">⬇ Download PNG</button>
      <button style="background:#e4e6eb;color:#1c1e21;" onclick="closeScreenshot()">✕ Close</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let posts = [];
let friends = [];
let stagedImageData = null;
let pendingFriendImage = null;
let postIdCounter = 1;

// ─── COVER PHOTO ─────────────────────────────────────────
function setCoverPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('cover-img').src = e.target.result;
    document.getElementById('cover-img').style.display = 'block';
    document.getElementById('cover-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ─── AVATAR ──────────────────────────────────────────────
function setAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('avatar-img').src = e.target.result; };
  reader.readAsDataURL(file);
}

// ─── INTRO ───────────────────────────────────────────────
function addIntroField() {
  const li = document.createElement('li');
  const icons = ['📍','🎓','💼','❤️','🌍','📞','✉️'];
  const icon = icons[Math.floor(Math.random() * icons.length)];
  li.innerHTML = `
    <span class="icon" style="cursor:pointer;" onclick="cycleIcon(this)" title="Click to change icon">${icon}</span>
    <span class="field" contenteditable="true" spellcheck="false">Click to add...</span>
    <button class="remove-btn" onclick="this.parentElement.remove()" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;padding:0 4px;" title="Remove">✕</button>
  `;
  document.getElementById('intro-list').appendChild(li);
  li.querySelector('.field').focus();
}

const iconCycle = ['📍','🎓','💼','❤️','🌍','📞','✉️','🏠','⭐','🗓️','📖'];
function cycleIcon(el) {
  const idx = iconCycle.indexOf(el.textContent);
  el.textContent = iconCycle[(idx + 1) % iconCycle.length];
}

// ─── FRIENDS ─────────────────────────────────────────────
function addFriend() {
  pendingFriendImage = null;
  document.getElementById('new-friend-name').value = '';
  document.getElementById('friend-avatar-preview').innerHTML = '📷';
  document.getElementById('friend-avatar-preview').style.backgroundImage = '';
  openModal('friend-modal');
  setTimeout(() => document.getElementById('new-friend-name').focus(), 100);
}

function previewFriendAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingFriendImage = e.target.result;
    const prev = document.getElementById('friend-avatar-preview');
    prev.innerHTML = `<img src="${e.target.result}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;">`;
  };
  reader.readAsDataURL(file);
}

function confirmAddFriend() {
  const name = document.getElementById('new-friend-name').value.trim() || 'Friend';
  const img = pendingFriendImage;
  friends.push({ name, img });
  renderFriends();
  closeModal('friend-modal');
}

function renderFriends() {
  const grid = document.getElementById('friends-grid');
  grid.innerHTML = '';
  friends.forEach((f, i) => {
    const tile = document.createElement('div');
    tile.className = 'friend-tile';
    const placeholder = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Crect width='80' height='80' fill='%23c8c8c8'/%3E%3Ccircle cx='40' cy='30' r='16' fill='%23aaa'/%3E%3Cellipse cx='40' cy='65' rx='22' ry='15' fill='%23aaa'/%3E%3C/svg%3E`;
    tile.innerHTML = `
      <img src="${f.img || placeholder}" alt="${f.name}" style="width:80px;height:80px;border-radius:6px;object-fit:cover;">
      <span class="friend-name" contenteditable="true" spellcheck="false" onblur="friends[${i}].name=this.textContent">${f.name}</span>
      <button class="remove-friend" onclick="removeFriend(${i})" title="Remove">✕</button>
    `;
    grid.appendChild(tile);
  });
  // add button at bottom of card
  let addBtn = document.getElementById('add-friend-btn');
  if (!addBtn) {
    addBtn = document.createElement('button');
    addBtn.id = 'add-friend-btn';
    addBtn.textContent = '+ Add Friend';
    addBtn.onclick = addFriend;
    document.querySelector('.card:last-child').appendChild(addBtn);
  }
}

function removeFriend(i) {
  friends.splice(i, 1);
  renderFriends();
}

// Render initial friends grid & button
renderFriends();
// Make sure button exists
(function() {
  if (!document.getElementById('add-friend-btn')) {
    const btn = document.createElement('button');
    btn.id = 'add-friend-btn';
    btn.textContent = '+ Add Friend';
    btn.onclick = addFriend;
    document.querySelectorAll('.card')[1].appendChild(btn);
  }
})();

// ─── POST COMPOSER ────────────────────────────────────────
function stagePostImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    stagedImageData = e.target.result;
    document.getElementById('staged-img-thumb').src = e.target.result;
    document.getElementById('staged-image-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearStagedImage() {
  stagedImageData = null;
  document.getElementById('staged-image-preview').style.display = 'none';
  document.getElementById('post-image-file').value = '';
}

function submitPost() {
  const author = document.getElementById('post-author').value.trim() || document.getElementById('profile-name').textContent.trim();
  const dateVal = document.getElementById('post-date').value;
  const content = document.getElementById('post-content').value.trim();
  if (!content && !stagedImageData) return;

  const date = dateVal ? new Date(dateVal + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  const post = {
    id: postIdCounter++,
    author,
    date,
    content,
    image: stagedImageData,
    likes: 0,
    liked: false,
    comments: []
  };

  posts.unshift(post);
  renderFeed();

  // Clear composer
  document.getElementById('post-content').value = '';
  clearStagedImage();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  posts.forEach(post => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.id = `post-${post.id}`;
    const initial = post.author ? post.author[0].toUpperCase() : '?';
    const commentsHtml = post.comments.map(c => `
      <div class="comment">
        <div class="comment-avatar">${c.author[0].toUpperCase()}</div>
        <div class="comment-bubble"><strong>${escHtml(c.author)}</strong>${escHtml(c.text)}</div>
      </div>
    `).join('');
    const contentHtml = linkify(escHtml(post.content));
    card.innerHTML = `
      <div class="post-header">
        <div class="post-avatar" style="background:#3b5998;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:16px;width:40px;height:40px;border-radius:50%;">${initial}</div>
        <div class="post-meta">
          <div class="post-author-name">${escHtml(post.author)}</div>
          <div class="post-date">${escHtml(post.date)}</div>
        </div>
      </div>
      <div class="post-body">${contentHtml}${post.image ? `<img src="${post.image}" alt="Post image">` : ''}</div>
      ${post.likes > 0 ? `<div class="like-count">👍 ${post.likes}</div>` : ''}
      <div class="post-footer">
        <button class="post-action ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})" style="${post.liked ? 'color:#3b5998;' : ''}">👍 ${post.liked ? 'Liked' : 'Like'}</button>
        <button class="post-action" onclick="toggleComments(${post.id})">💬 Comment</button>
        <button class="post-action delete" onclick="deletePost(${post.id})">🗑 Delete</button>
      </div>
      <div class="comments-section" id="comments-${post.id}">
        <div id="comment-list-${post.id}">${commentsHtml}</div>
        <div class="comment-form">
          <div class="comment-author-row">
            <label>Author</label>
            <input type="text" class="comment-author-input" id="comment-author-${post.id}" placeholder="Your name…" value="${escHtml(post.author || '')}">
          </div>
          <div class="comment-text-row">
            <input type="text" id="comment-input-${post.id}" placeholder="Write a comment…" onkeydown="if(event.key==='Enter')submitComment(${post.id})">
            <button onclick="submitComment(${post.id})">Post</button>
          </div>
        </div>
      </div>
    `;
    feed.appendChild(card);
  });
}

function toggleLike(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  post.liked = !post.liked;
  post.likes += post.liked ? 1 : -1;
  renderFeed();
}

function toggleComments(id) {
  const section = document.getElementById(`comments-${id}`);
  section.classList.toggle('visible');
  if (section.classList.contains('visible')) {
    document.getElementById(`comment-input-${id}`).focus();
  }
}

function submitComment(id) {
  const input = document.getElementById(`comment-input-${id}`);
  const text = input.value.trim();
  if (!text) return;
  const post = posts.find(p => p.id === id);
  const authorField = document.getElementById(`comment-author-${id}`);
  const author = (authorField ? authorField.value.trim() : '') || document.getElementById('post-author').value.trim() || document.getElementById('profile-name').textContent.trim() || 'You';
  post.comments.push({ author, text });
  renderFeed();
  // Re-show comments
  const section = document.getElementById(`comments-${id}`);
  section.classList.add('visible');
  document.getElementById(`comment-input-${id}`).focus();
}

function deletePost(id) {
  posts = posts.filter(p => p.id !== id);
  renderFeed();
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#3b5998;">$1</a>');
}

// ─── MODAL HELPERS ───────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ─── SAVE / LOAD ─────────────────────────────────────────
function saveData() {
  const data = {
    name: document.getElementById('profile-name').textContent,
    cover: document.getElementById('cover-img').src,
    avatar: document.getElementById('avatar-img').src,
    friendsTitle: document.getElementById('friends-title').textContent,
    intro: Array.from(document.querySelectorAll('#intro-list li')).map(li => ({
      icon: li.querySelector('.icon')?.textContent || '',
      text: li.querySelector('.field')?.textContent || ''
    })),
    friends,
    posts
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fakebook-profile.json';
  a.click();
}

function loadData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.name) document.getElementById('profile-name').textContent = data.name;
        if (data.cover && data.cover !== window.location.href) {
          document.getElementById('cover-img').src = data.cover;
          document.getElementById('cover-img').style.display = 'block';
          document.getElementById('cover-placeholder').style.display = 'none';
        }
        if (data.avatar) document.getElementById('avatar-img').src = data.avatar;
        if (data.friendsTitle) document.getElementById('friends-title').textContent = data.friendsTitle;
        if (data.intro) {
          const list = document.getElementById('intro-list');
          list.innerHTML = '';
          data.intro.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `
              <span class="icon" style="cursor:pointer;" onclick="cycleIcon(this)" title="Click to change">${item.icon}</span>
              <span class="field" contenteditable="true" spellcheck="false">${item.text}</span>
              <button class="remove-btn" onclick="this.parentElement.remove()" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;padding:0 4px;">✕</button>
            `;
            list.appendChild(li);
          });
        }
        if (data.friends) { friends = data.friends; renderFriends(); }
        if (data.posts) { posts = data.posts; postIdCounter = posts.length ? Math.max(...posts.map(p=>p.id)) + 1 : 1; renderFeed(); }
      } catch(err) { alert('Could not load file: ' + err.message); }
    };
    reader.readAsDataURL(file);
    reader.readAsText(file);
  };
  // Fix: readAsText only
  const input2 = document.createElement('input');
  input2.type = 'file';
  input2.accept = '.json';
  input2.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.name) document.getElementById('profile-name').textContent = data.name;
        if (data.cover && !data.cover.startsWith('data:image') === false) {
          document.getElementById('cover-img').src = data.cover;
          document.getElementById('cover-img').style.display = 'block';
          document.getElementById('cover-placeholder').style.display = 'none';
        }
        if (data.avatar) document.getElementById('avatar-img').src = data.avatar;
        if (data.friendsTitle) document.getElementById('friends-title').textContent = data.friendsTitle;
        if (data.intro) {
          const list = document.getElementById('intro-list');
          list.innerHTML = '';
          data.intro.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `
              <span class="icon" style="cursor:pointer;" onclick="cycleIcon(this)" title="Click to change">${item.icon}</span>
              <span class="field" contenteditable="true" spellcheck="false">${item.text}</span>
              <button class="remove-btn" onclick="this.parentElement.remove()" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;padding:0 4px;">✕</button>
            `;
            list.appendChild(li);
          });
        }
        if (data.friends) { friends = data.friends; renderFriends(); }
        if (data.posts) { posts = data.posts; postIdCounter = posts.length ? Math.max(...posts.map(p=>p.id)) + 1 : 1; renderFeed(); }
      } catch(err) { alert('Could not load file: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input2.click();
}

function printPage() { window.print(); }

// ─── SCREENSHOT ───────────────────────────────────────────
let screenshotDataUrl = null;

async function takeScreenshot() {
  // Load html2canvas if not already loaded
  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // ── Build an off-screen clone of the page to screenshot ───
  // We never touch the live DOM — we clone it, modify the clone,
  // screenshot that, then discard it.

  const clone = document.documentElement.cloneNode(true);

  // Remove elements we don't want in the screenshot
  const removeSelectors = [
    '#screenshot-overlay',
    '#composer',
    '#topbar button',
    '#topbar .tagline',
    '#cover-edit-btn',
    '#cover-file',
    '#avatar-file',
    '#friend-file',
    '#post-image-file',
    '.edit-link',
    '.remove-friend',
    '.remove-btn',
    '#add-friend-btn',
    '.post-footer',
    '.like-count',
    '.comment-form',
    '.modal-backdrop',
  ];
  removeSelectors.forEach(sel => {
    clone.querySelectorAll(sel).forEach(el => el.remove());
  });

  // Show ALL comment sections in the screenshot (open or not)
  clone.querySelectorAll('.comments-section').forEach(el => {
    el.classList.add('visible');
  });

  // Switch logo to "facebook"
  const cloneLogo = clone.querySelector('#topbar .logo');
  if (cloneLogo) {
    cloneLogo.textContent = 'facebook';
    cloneLogo.style.fontStyle = 'normal';
    cloneLogo.style.fontWeight = '900';
    cloneLogo.style.fontSize = '26px';
    cloneLogo.style.letterSpacing = '-1px';
    cloneLogo.style.color = 'white';
  }

  // Remove contenteditable borders/hovers by injecting a style
  const noEditStyle = clone.ownerDocument
    ? clone.querySelector('head')
    : clone.querySelector('head');
  if (noEditStyle) {
    const s = document.createElement('style');
    s.textContent = `
      [contenteditable] { border: none !important; background: transparent !important; cursor: default !important; }
      #topbar { position: relative !important; }
    `;
    noEditStyle.appendChild(s);
  }

  // Pre-render object-fit images so html2canvas gets them right
  const imgEls = document.querySelectorAll('img'); // measure from LIVE dom for sizes
  const cloneImgEls = clone.querySelectorAll('img');
  for (let i = 0; i < imgEls.length; i++) {
    const liveImg = imgEls[i];
    const cloneImg = cloneImgEls[i];
    if (!cloneImg) continue;
    const computed = window.getComputedStyle(liveImg);
    const fit = computed.objectFit;
    if (!['cover','contain'].includes(fit)) continue;
    const dispW = liveImg.offsetWidth, dispH = liveImg.offsetHeight;
    if (!dispW || !dispH || !liveImg.src || liveImg.src === window.location.href) continue;

    const dataUrl = await new Promise(resolve => {
      const tmp = new Image();
      tmp.crossOrigin = 'anonymous';
      tmp.onload = () => {
        const c = document.createElement('canvas');
        c.width = dispW; c.height = dispH;
        const ctx = c.getContext('2d');
        const nw = tmp.naturalWidth, nh = tmp.naturalHeight;
        if (fit === 'cover') {
          const scale = Math.max(dispW / nw, dispH / nh);
          const sw = dispW / scale, sh = dispH / scale;
          const sx = (nw - sw) / 2, sy = (nh - sh) / 2;
          ctx.drawImage(tmp, sx, sy, sw, sh, 0, 0, dispW, dispH);
        } else {
          const scale = Math.min(dispW / nw, dispH / nh);
          const dw = nw * scale, dh = nh * scale;
          ctx.drawImage(tmp, 0, 0, nw, nh, (dispW-dw)/2, (dispH-dh)/2, dw, dh);
        }
        resolve(c.toDataURL('image/png'));
      };
      tmp.onerror = () => resolve(null);
      tmp.src = liveImg.src;
    });

    if (dataUrl) {
      cloneImg.src = dataUrl;
      cloneImg.style.cssText = `width:${dispW}px;height:${dispH}px;display:block;object-fit:unset;border-radius:${computed.borderRadius};`;
    }
  }

  // Mount clone in a hidden off-screen iframe
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:-99999px;top:0;width:' + document.documentElement.scrollWidth + 'px;height:' + document.documentElement.scrollHeight + 'px;border:none;visibility:hidden;';
  document.body.appendChild(iframe);

  try {
    iframe.contentDocument.open();
    iframe.contentDocument.write('<!DOCTYPE html>' + clone.outerHTML);
    iframe.contentDocument.close();

    // Wait for iframe to paint
    await new Promise(r => setTimeout(r, 150));

    const canvas = await html2canvas(iframe.contentDocument.body, {
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#e9ebee',
      scale: window.devicePixelRatio || 1,
      scrollX: 0,
      scrollY: 0,
      windowWidth: iframe.contentDocument.body.scrollWidth,
      windowHeight: iframe.contentDocument.body.scrollHeight,
    });

    screenshotDataUrl = canvas.toDataURL('image/png');
    document.getElementById('screenshot-result').src = screenshotDataUrl;
    document.getElementById('screenshot-overlay').classList.add('visible');
  } catch (err) {
    alert('Screenshot failed: ' + err.message);
  } finally {
    iframe.remove(); // discard — live DOM was never touched
  }
}

function downloadScreenshot() {
  if (!screenshotDataUrl) return;
  const a = document.createElement('a');
  a.href = screenshotDataUrl;
  const name = document.getElementById('profile-name').textContent.trim().replace(/\s+/g, '_') || 'profile';
  a.download = `fakebook_${name}.png`;
  a.click();
}

function closeScreenshot() {
  document.getElementById('screenshot-overlay').classList.remove('visible');
  screenshotDataUrl = null;
  document.getElementById('screenshot-result').src = '';
}

// ─── SET TODAY'S DATE ─────────────────────────────────────
(function() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('post-date').value = today;
})();
</script>
